volumes:
  etc_wireguard:
  sqlite_data:
  certs_data:
  acme_data:

services:
  phobos:
    image: ${WG_EASY_IMAGE:-ghcr.io/ground-zerro/phobos:latest}
    container_name: phobos
    environment:
      - OBF_PORT=${OBF_PORT:-51822}
      - WG_HOST=${WG_HOST:-}
      - INIT_ENABLED=${INIT_ENABLED:-false}
      - INIT_USERNAME=${INIT_USERNAME:-}
      - INIT_PASSWORD=${INIT_PASSWORD:-}
      - INIT_HOST=${INIT_HOST:-}
    networks:
      wg:
        ipv4_address: 10.42.42.42
        ipv6_address: fdcc:ad94:bacf:61a3::2a
    volumes:
      - etc_wireguard:/etc/wireguard
      - sqlite_data:/app/server/data
      - certs_data:/app/certs
      - acme_data:/root/.acme.sh
      - /lib/modules:/lib/modules:ro
    ports:
      - "80:80"
      - "${OBF_PORT:-51822}:${OBF_PORT:-51822}/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

networks:
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
        - subnet: fdcc:ad94:bacf:61a3::/64
