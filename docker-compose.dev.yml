services:
  wg-easy:
    build:
      dockerfile: ./Dockerfile.dev
    command: dev
    volumes:
      - ./src/:/app/
      - temp:/app/.nuxt/
      - temp1:/app/node_modules/
      - /lib/modules:/lib/modules:ro
    ports:
      - "${OBF_PORT:-51822}:${OBF_PORT:-51822}/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - INIT_ENABLED=true
      - INIT_HOST=test
      - INIT_USERNAME=testtest
      - INIT_PASSWORD=Qweasdyxcv!2
      - OBF_PORT=${OBF_PORT:-51822}

volumes:
  temp:
    driver: local
  temp1:
    driver: local
