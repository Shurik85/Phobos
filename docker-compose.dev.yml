name: phoboswg-dev

services:
  phobos-dev:
    build:
      dockerfile: ./Dockerfile.dev
    command: dev
    volumes:
      - ./src/:/app/
      - temp:/app/.nuxt/
      - temp1:/app/node_modules/
      - /lib/modules:/lib/modules:ro
    ports:
      - "51822-51921:51822-51921/udp"
      - "51831:51831/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PORT=51831
      - INIT_ENABLED=true
      - INIT_HOST=test
      - INIT_USERNAME=testtest
      - INIT_PASSWORD=Qweasdyxcv!2

volumes:
  temp:
    driver: local
  temp1:
    driver: local
